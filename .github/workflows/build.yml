name: Build MagicRemoteService

on:
  push:
    branches: [ master, main, 'claude/**' ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore MagicRemoteService.sln

    - name: Build Debug
      run: msbuild MagicRemoteService.sln /p:Configuration=Debug /p:Platform="Any CPU" /clp:Summary /nologo

    - name: Build Release
      run: msbuild MagicRemoteService.sln /p:Configuration=Release /p:Platform="Any CPU" /clp:Summary /nologo

    - name: Upload Release artifact
      uses: actions/upload-artifact@v4
      with:
        name: MagicRemoteService-Release
        path: |
          MagicRemoteService/bin/Release/MagicRemoteService.exe
          MagicRemoteService/bin/Release/MagicRemoteService.exe.config
          MagicRemoteService/bin/Release/*.dll
          MagicRemoteService/bin/Release/es/
          MagicRemoteService/bin/Release/fr/
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: MagicRemoteService-Release
        path: release/

    - name: Create zip
      run: cd release && zip -r ../MagicRemoteService.zip .

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: MagicRemoteService.zip
